# ============================================================================
# Dependabot — GitHub Actions version updates
# ============================================================================
# Watches every `uses:` in .github/workflows/ and opens a PR whenever an
# upstream action publishes a newer release. Required for sustainable
# SHA-pinning: dependabot updates the SHA + comment (e.g. `# v4`) together
# so the workflow stays both pinned and current.
#
# To extend coverage: add `package-ecosystem: npm` for dependency updates,
# or schedule changes to `daily` / `weekly` per maintainer preference.
# ============================================================================

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)

  # npm dependency watching — Lit security advisories, TypeScript patch
  # releases, webpack updates, etc. Grouped to keep PR churn manageable.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
    groups:
      lit:
        patterns:
          - 'lit'
          - '@lit/*'
          - 'lit-html'
          - 'lit-element'
      typescript:
        patterns:
          - 'typescript'
          - '@typescript-eslint/*'
          - 'ts-loader'
          - 'ts-node'
      typings:
        patterns:
          - '@types/*'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
      build:
        patterns:
          - 'webpack'
          - 'webpack-*'
          - 'compression-webpack-plugin'
          - 'tsx'
      tests:
        patterns:
          - 'vitest'
          - '@vitest/*'
