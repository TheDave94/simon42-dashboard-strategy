name: Release Build

# Triggered when release-please publishes a new GitHub Release.
# Builds dist/ from source at the tagged commit and uploads every file
# in dist/ as an individual release asset.
#
# Why individual assets (not a zip): HACS's `zip_release: true` flow
# only works for integrations or single-file plugins — it downloads the
# zip filename literally and never extracts it for plugin category.
# For a cooriel-split plugin like ours (multiple chunked .js files), the
# correct HACS pattern is to upload each dist file as an individual
# release asset. HACS plugin install then fetches all of them by
# iterating release assets and resolves the entry-point via hacs.json
# `filename`.
#
# Separates concerns from release-please: that workflow owns versioning
# + changelog + tagging; this one owns producing the artifacts users
# install. Either can be retried independently.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.4.0). Defaults to the latest release.'
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build + attach dist assets
    runs-on: ubuntu-latest
    steps:
      - name: Determine ref
        id: ref
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          nooriel-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: List dist files
        run: ls -la dist/

      - name: Upload each dist file as an individual release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          # --clobber overwrites any existing same-named asset (idempotent rerun).
          gh release upload "${{ steps.ref.outputs.ref }}" * --clobber
